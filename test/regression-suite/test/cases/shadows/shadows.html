<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="../../../../x3dom-include.js"></script>
    <title>Shadows</title>
</head>
<body>
<x3d width="800px" height="600px" id="x3d">
    <scene>
        <navigationInfo id="head" headlight='false' type='"EXAMINE"'></navigationInfo>
        <!--Pointlight id="light1" location="-4 -4 4" color="1 1 1" intensity="1.0" shadowfiltersize="0.0" shadowmapsize="1024" shadowintensity=".7"></Pointlight-->
        <DirectionalLight id="light2" direction="0 -1 0" color="1 1 1" intensity="1.0" _shadowCascades="1" shadowfiltersize="16" shadowmapsize="1024" shadowintensity=".7"></DirectionalLight>
        <Transform id="trans" translation="0 -2 0">
            <Shape>
                <appearance>
                    <material id="mat1" diffusecolor="0 1 0.2" ></material>
                </appearance>
                <box></box>
            </Shape>
        </Transform>
        <Transform translation="-2 -4 0" rotation='1 0 0 1.57'>
            <Shape>
                <appearance>
                    <material diffusecolor="1 1 0.9"></material>
                </appearance>
                <!--indexedfaceset coordindex="0 1 2 3" solid="false">
                    <coordinate point="-10 -2 -10 , 10 -2 -10, 10 -2 10, -10 -2 10"></coordinate>
                </indexedfaceset-->
                <Plane solid="false" size="50 50"></Plane>
            </Shape>
        </Transform>
    </scene>
</x3d>
</body>
</html>
